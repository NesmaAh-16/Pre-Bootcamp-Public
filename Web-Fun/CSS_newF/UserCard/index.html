<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card-container">
        <div class="card-header"></div>
        <div class="card-body">
            <div class="user-img-container">
                <img src="circle-user-solid.png" alt="User Image">
            </div>
            <div class="user-info">
                <h1>Jane Doe</h1>
                <div class="location">
                    <img src="location-dot-solid.png" alt="location" class="icon-small">
                    <span>Seattle</span>
                </div>
                <p class="description">
                    Developer | Engineer | Problem Solver <br>
                    Master of shadows and the Internet!
                </p>
                <a href="#" class="edit-link">
                    <img src="gear-solid.png" alt="settings" class="icon-small">
                    edit profile
                </a>
            </div>
        </div>
    </div>
</body>

</html>
